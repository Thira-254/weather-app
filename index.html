<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <title>Weather project</title>
  </head>
  <body>
    <div class="container">
      <form action="/submit">
        <input class="city-search" placeholder="Enter a city" required />
        <button type="submit">Search</button>
      </form>
      <h1 class="city">Paris</h1>
      <div class="weather-app-temperature-container">
        <div class="weather-app-icon">🌟</div>
        <div class="weather-app-temperature">16</div>
        <div class="temperature-unit">°C</div>
      </div>
      <div class="weather-data">
        Sunday 09:34, few clouds
        <br />Humidity: <strong>79%</strong>, Wind: <strong>2.24km/h</strong>
      </div>
      <div class="weather-forecast">
        <div class="weather-forecast-day">
          <div class="weather-forecast-date">Tue</div>
          <div class="weather-forecast-icon">🌟</div>
          <div class="weather-forecast-temperatures">
            <div class="weather-forecast-temperature">
              <strong>15°</strong>
            </div>
            <div class="weather-forecast-temperature">9°</div>
          </div>
        </div>
        <div class="weather-forecast-day">
          <div class="weather-forecast-date">Wed</div>
          <div class="weather-forecast-icon">🌟</div>
          <div class="weather-forecast-temperatures">
            <div class="weather-forecast-temperature">
              <strong>15°</strong>
            </div>
            <div class="weather-forecast-temperature">9°</div>
          </div>
        </div>
        <div class="weather-forecast-day">
          <div class="weather-forecast-date">Thu</div>
          <div class="weather-forecast-icon">🌟</div>
          <div class="weather-forecast-temperatures">
            <div class="weather-forecast-temperature">
              <strong>15°</strong>
            </div>
            <div class="weather-forecast-temperature">9°</div>
          </div>
        </div>
        <div class="weather-forecast-day">
          <div class="weather-forecast-date">Fri</div>
          <div class="weather-forecast-icon">🌟</div>
          <div class="weather-forecast-temperatures">
            <div class="weather-forecast-temperature">
              <strong>15°</strong>
            </div>
            <div class="weather-forecast-temperature">9°</div>
          </div>
        </div>
        <div class="weather-forecast-day">
          <div class="weather-forecast-date">Sat</div>
          <div class="weather-forecast-icon">🌟</div>
          <div class="weather-forecast-temperatures">
            <div class="weather-forecast-temperature">
              <strong>15°</strong>
            </div>
            <div class="weather-forecast-temperature">9°</div>
          </div>
        </div>
        <div class="weather-forecast-day">
          <div class="weather-forecast-date">Sun</div>
          <div class="weather-forecast-icon">🌟</div>
          <div class="weather-forecast-temperatures">
            <div class="weather-forecast-temperature">
              <strong>15°</strong>
            </div>
            <div class="weather-forecast-temperature">9°</div>
          </div>
        </div>
      </div>
      <footer>
        This project was coded by
        <a href="https://github.com/Thira-254">Thira</a> is
        <a href="https://github.com/Thira-254/vanilla-weather-project">
          open sourced on Github</a
        >
        and
        <a href="https://app.netlify.com/projects/vanilla-p/overview">
          hosted on Netlify</a
        >
      </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>
